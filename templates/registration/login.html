<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - MedCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1d3a 0%, #0d6efd 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 20px; padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 420px; width: 100%;
        }
        .login-card .brand { text-align: center; margin-bottom: 30px; }
        .login-card .brand i { font-size: 3rem; color: #0d6efd; }
        .login-card .brand h2 { color: #1a1d3a; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="bi bi-hospital"></i>
            <h2>MedCenter</h2>
            <p class="text-muted">Tibbiyot markazi boshqaruv tizimi</p>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger">Login yoki parol noto'g'ri!</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Telefon raqami</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label">Parol</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> Kirish
            </button>

            <div class="text-center mt-3">
                <span class="text-muted">Hisobingiz yo'qmi?</span>
                <a href="{% url 'register' %}" class="fw-bold">Ro'yxatdan o'ting</a>
            </div>
        </form>
    </div>
</body>
</html>
